# Field Parameters 
dim: 128
num_output_chans: 2
output_chan_width: 0.23 # in mm 
LG_modes: [[0,0], [2,0]]
w0: 0.10 # in mm
gauss_filter_sigma: 1000
channel_sep: 1.5

# Experimental Parameters of the Setup
num_phase_maps_near: 3
num_phase_maps_far: 0

rot_angle: '0' # Rotates the incident field by rot_angle 
fixedRotation: True 
randomRotation: False

# Simulates the lens
simulateLens: False
fourier_length: 10 # in cm 

# Simulates the experiment with multiple phase screens 
multiPhaseLens: False
multiPhase: True
z_o: 30 # in cm

# Genetic Parameters
num_of_gens: 1.e5
gen_start: 1.e4
parents_mating: 2
sol_per_pop: 10
crossover_prob: None
mutation_type: 'adaptive'
mutation_percent: 15
mutation_prob: (0.10,0.01)
gen_saturate: 20000
parent_c: 1.0
parent_k: 1.0
ga_instance: "tref_cinque_3phaselens_30cm"

# Do we generate knots instead? 
isKnot: True
knotType: ['Trefoil', 'Cinquefoil']
shapeParams: [[1,1,1.2],[1.4,1.4,1.2]]


